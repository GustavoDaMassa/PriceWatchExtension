<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PriceWatch</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">PriceWatch</div>

  <div class="content">
    <div id="login-view">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="btn-login">Entrar</button>
      <div class="error" id="error-msg"></div>
    </div>

    <div id="logged-view" class="hidden">
      <div class="user-info">
        <div class="user-name" id="user-name"></div>
        <div class="user-email" id="user-email"></div>
      </div>
      <button class="btn btn-outline" id="btn-logout">Sair</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
